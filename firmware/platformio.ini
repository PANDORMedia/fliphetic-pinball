; PlatformIO project for the HETIC Pinball ESP32 button box.
; The CI workflow (.github/workflows/firmware.yml) runs `pio run` here,
; merges the output, and commits firmware/build/firmware.bin which the
; cabinet flashes on load.

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
