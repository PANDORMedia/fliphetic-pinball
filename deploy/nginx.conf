# Serves the game and proxies /state to the relay service so the playfield,
# DMD and backglass screens share live game state over the same origin.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /state {
        # resolve the relay container name lazily via Docker's embedded DNS,
        # so nginx starts even if the relay is not up yet
        resolver 127.0.0.11 valid=10s;
        set $relay relay;
        proxy_pass http://$relay:8090/state;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
