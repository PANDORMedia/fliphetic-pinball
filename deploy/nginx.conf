# Serves the game and proxies:
#   /state      -> relay  (shared screen state)
#   /esp        -> bridge (ESP32 button state, one-shot snapshot)
#   /esp/events -> bridge (ESP32 button state, live SSE stream)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # resolve container names lazily via Docker's embedded DNS, so nginx
    # starts even if a backend is not up yet
    resolver 127.0.0.11 valid=10s;

    location = /state {
        set $relay relay;
        proxy_pass http://$relay:8090/state;
        proxy_http_version 1.1;
    }

    location = /esp {
        set $bridge bridge;
        proxy_pass http://$bridge:8091/state;
        proxy_connect_timeout 2s;
    }

    # live button stream (Server-Sent Events) — buffering off so each event
    # reaches the game the instant the ESP sends it
    location = /esp/events {
        set $bridge bridge;
        proxy_pass http://$bridge:8091/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
