# Two services: nginx serves the game on all three screens and proxies /state
# to the relay; the relay holds the live game state shared between screens.
services:
  game:
    image: nginx:alpine
    volumes:
      - ../site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["0:80"]
    depends_on: [relay]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 5s
      timeout: 2s
      retries: 5

  relay:
    # AWS ECR public mirror of the Docker official node image, to avoid
    # Docker Hub's anonymous pull rate limit on the cabinet.
    image: public.ecr.aws/docker/library/node:20-alpine
    working_dir: /app
    volumes:
      - ../relay:/app:ro
    command: ["node", "server.js"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/"]
      interval: 5s
      timeout: 2s
      retries: 5
