<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HETIC Pinball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.js" } }
  </script>
</head>
<body>

  <!-- playfield: the Three.js game, with side panels filling a 16:9 screen -->
  <div id="playfield-screen">
    <canvas id="view"></canvas>

    <div class="pf-side pf-left">
      <div class="pf-label">HETIC</div>
      <div id="ball">HETIC PINBALL</div>
    </div>

    <div class="pf-side pf-right">
      <div class="pf-label">TARGETS</div>
      <div id="hetic">
        <span class="hetic-letter">H</span>
        <span class="hetic-letter">E</span>
        <span class="hetic-letter">T</span>
        <span class="hetic-letter">I</span>
        <span class="hetic-letter">C</span>
      </div>
      <div class="pf-label">PLUNGER</div>
      <div id="plunger-meter"><div id="plunger-fill"></div></div>
      <div id="mult"></div>
      <div id="message"></div>
    </div>

    <div id="attract">
      <div class="attract-box">
        <div class="attract-title">HETIC<br>PINBALL</div>
        <div class="attract-press">PRESS START</div>
        <div class="attract-controls">
          <span>&#9665; &#9655; FLIPPERS</span>
          <span>HOLD SPACE &mdash; PLUNGER</span>
          <span>ENTER &mdash; START</span>
          <span>M &mdash; MUTE MUSIC</span>
        </div>
        <div class="attract-demo">DEMO PLAYING</div>
      </div>
    </div>
  </div>

  <!-- HETIC MODE celebration (playfield) -->
  <div id="hetic-mode">
    <div class="hm-1">HETIC MODE</div>
    <div class="hm-2">TRIPLE SCORE</div>
    <div class="hm-3">&#9670; X3 &#9670;</div>
  </div>

  <!-- dmd + backglass: built by their modules -->
  <div id="dmd-screen"></div>
  <div id="backglass-screen"></div>

  <div id="scanlines"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
