[app]
id          = "fliphetic-pinball"
name        = "HETIC Pinball"
authors     = ["PANDOR Media"]
description = "Matrix-themed Three.js pinball demo. Runs on the playfield screen, plays itself in attract mode when left alone, and is controlled by an ESP32 button box via the editable config/buttons.json map."

[deploy]
strategy = "branch"
ref      = "main"

# The game runs on the large portrait playfield screen.
[screens]
playfield = { service = "game", port = 80 }

[compose]
file = "deploy/docker-compose.yml"
ready_timeout = 15

# No [esp32] block: the firmware is not flashed by the cabinet. The ESP32 in
# the button box acts as a USB HID keyboard. See firmware/README.md and
# site/config/buttons.json.
