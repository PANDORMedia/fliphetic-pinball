[app]
id          = "fliphetic-pinball"
name        = "HETIC Pinball"
authors     = ["PANDOR Media"]
description = "Top-down Three.js pinball across all three cabinet screens. Attract-mode auto-play, variable plunger with a one-way shooter circuit, keyboard or ESP32 control. The playfield broadcasts live state to the DMD and backglass."

[deploy]
strategy = "branch"
ref      = "main"

# All three screens are served by the one nginx service. The page reads the
# ?screen= query param to pick the playfield game, the DMD, or the backglass.
[screens]
playfield = { service = "game", port = 80 }
backglass = { service = "game", port = 80, path = "/?screen=backglass" }
dmd       = { service = "game", port = 80, path = "/?screen=dmd" }

[compose]
file = "deploy/docker-compose.yml"
ready_timeout = 40

# No [esp32] block: the ESP32 button box is a USB HID keyboard, not flashed by
# the cabinet. See firmware/ and site/config/buttons.json.
